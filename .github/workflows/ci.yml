name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Pip Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install QA Tools
        run: |
          pip install black==26.5.1 flake8==7.3.0 bandit==1.9.4

      - name: Debug Environment
        run: |
          echo "===== COMMIT ====="
          git rev-parse HEAD

          echo "===== PYTHON ====="
          python --version

          echo "===== BLACK ====="
          black --version

          echo "===== FILES ====="
          find . -name "*.py"

      - name: Black Format Check
        run: |
          black --check .

      - name: Flake8 Lint Check
        run: |
          flake8 .

      - name: Security Scan
        run: |
           bandit -r app -ll

      - name: Validate Python Syntax
        run: |
          python -m compileall .

  test:
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Test Tools
        run: |
          pip install pytest

      - name: Run Tests
        run: |
          if [ -d "tests" ]; then
           pytest tests -v
         else
           echo "No tests directory found. Skipping tests."
        fi
