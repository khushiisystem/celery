name: CI

on:
  pull_request:
    branches:
      - main
      - develop

  push:
    branches:
      - main
      - develop

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install QA Tools
        run: |
          pip install flake8 black bandit

      - name: Check Formatting
        run: |
          black --check .

      - name: Run Linting
        run: |
          flake8 .

      - name: Security Scan
        run: |
          bandit -r .

      - name: Validate Python Syntax
        run: |
          python -m compileall .

  test:
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Test Dependencies
        run: |
          pip install pytest

      - name: Run Tests
        run: |
          pytest -v
